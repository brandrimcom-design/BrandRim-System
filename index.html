// تسجيل الدخول
async function signIn(email, password) {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    return data.session;
}

// إنشاء حساب
async function signUp(email, password, fullName) {
    const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { full_name: fullName } }
    });
    if (error) throw error;
    return data;
}

// تسجيل الخروج
async function signOut() {
    await supabase.auth.signOut();
}

// تغيير كلمة المرور (للمستخدم المسجل الدخول)
async function updatePassword(newPassword) {
    const { error } = await supabase.auth.updateUser({ password: newPassword });
    if (error) throw error;
}

// إعادة تعيين كلمة المرور (إرسال بريد)
async function resetPassword(email) {
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname,
    });
    if (error) throw error;
}

async function fetchClients() {
    const { data, error } = await supabase
        .from('clients')
        .select('*')
        .order('created_at', { ascending: true });
    if (error) throw error;
    return data.map(row => ({
        id: row.id,
        name: row.name,
        email: row.email,
        phone: row.phone,
        serviceType: row.service_type,
        country: row.country,
        appType: row.app_type,
        key: row.key,
        mac: row.mac,
        startDate: row.start_date,
        endDate: row.end_date,
        price: row.price,
        netProfit: row.net_profit,
        notes: row.notes
    }));
}

async function addClient(client) {
    const { data, error } = await supabase
        .from('clients')
        .insert({
            name: client.name,
            email: client.email,
            phone: client.phone,
            service_type: client.serviceType,
            country: client.country,
            app_type: client.appType,
            key: client.key,
            mac: client.mac,
            start_date: client.startDate,
            end_date: client.endDate,
            price: parseFloat(client.price) || 0,
            net_profit: parseFloat(client.netProfit) || 0,
            notes: client.notes
        })
        .select()
        .single();
    if (error) throw error;
    return data;
}

async function updateClient(clientId, updates) {
    const { error } = await supabase
        .from('clients')
        .update({
            name: updates.name,
            email: updates.email,
            phone: updates.phone,
            service_type: updates.serviceType,
            country: updates.country,
            app_type: updates.appType,
            key: updates.key,
            mac: updates.mac,
            start_date: updates.startDate,
            end_date: updates.endDate,
            price: parseFloat(updates.price) || 0,
            net_profit: parseFloat(updates.netProfit) || 0,
            notes: updates.notes
        })
        .eq('id', clientId);
    if (error) throw error;
}

async function deleteClient(clientId) {
    const { error } = await supabase
        .from('clients')
        .delete()
        .eq('id', clientId);
    if (error) throw error;
}

const THRESHOLDS = [{ limit:5, code:'1990', icon:'🌱', label:'أول 5 عملاء' }, { limit:50, code:'2000', icon:'🚀', label:'50 عميلاً' }, { limit:100, code:'2010', icon:'💎', label:'100 عميل' }];
let unlockedThresholds = JSON.parse(localStorage.getItem('unlockedThresholds') || '[]');

function checkThresholdNeeded(newCount) {
    for(let i=THRESHOLDS.length-1;i>=0;i--) {
        if(newCount >= THRESHOLDS[i].limit && !unlockedThresholds.includes(THRESHOLDS[i].limit)) {
            return THRESHOLDS[i];
        }
    }
    return null;
}
function showThresholdLock(threshold, onUnlock) {
    // محاكاة فتح العتبة (يمكن تحسينها)
    if(confirm(`🎉 لقد وصلت إلى ${threshold.label}!\nأدخل الكود: ${threshold.code}`)) {
        unlockedThresholds.push(threshold.limit);
        localStorage.setItem('unlockedThresholds', JSON.stringify(unlockedThresholds));
        onUnlock();
        showToast(`✅ تم فتح ${threshold.label}`);
    }
}

function showToast(msg) {
    let el=document.createElement('div');
    el.className='toast';
    el.innerText=msg;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2500);
}
function copyToClipboard(text,msg) {
    if(!text) return;
    navigator.clipboard.writeText(text).then(()=>showToast(msg)).catch(()=>{
        let ta=document.createElement('textarea');
        ta.value=text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        showToast(msg);
    });
}
function escapeHtml(str) { return String(str||'').replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]); }
function daysRemaining(end) { try{ return Math.ceil((new Date(end)-new Date())/(1000*60*60*24)); }catch(e){ return -1; } }

let skippedNotifs = JSON.parse(sessionStorage.getItem('skippedNotifs') || '[]');
let processedNotifs = JSON.parse(sessionStorage.getItem('processedNotifs') || '[]');

function renderNotifications() {
    if(!currentSession) return;
    const expiringSoon = loggedInClients.filter(c => { let d=daysRemaining(c.endDate); return d>=0 && d<=7; });
    const container = document.getElementById('notificationsArea');
    if(!container) return;
    container.innerHTML = '';
    const visible = expiringSoon.filter(c => !skippedNotifs.includes(String(c.id)) && !processedNotifs.includes(String(c.id)));
    if(expiringSoon.length===0) return;
    const header = document.createElement('div');
    header.className='mb-2 flex items-center gap-2';
    header.innerHTML=`<i class="fas fa-bell text-amber-300 animate-pulse"></i><span class="text-white font-bold text-xs">${t('notification_title')}</span><span class="bg-amber-400/30 text-amber-200 text-xs px-2 rounded-full">${visible.length}</span>`;
    container.appendChild(header);
    visible.forEach(c => {
        const days = daysRemaining(c.endDate);
        const div = document.createElement('div');
        div.className='notification-item';
        div.innerHTML=`<div class="flex justify-between items-center flex-wrap gap-2"><div><i class="fas fa-exclamation-triangle text-amber-400 text-sm"></i> <span class="text-white text-xs">${t('expiring_soon_notif').replace('{name}',c.name).replace('{days}',days)}</span></div><div class="flex gap-1"><button class="copy-notif-btn copy-phone text-white text-xs px-2 py-1 rounded-full bg-white/20"><i class="fas fa-phone-alt"></i> ${t('copy_phone')}</button><button class="copy-notif-btn copy-email text-white text-xs px-2 py-1 rounded-full bg-white/20"><i class="fas fa-envelope"></i> ${t('copy_email')}</button><button class="process-notif-btn text-white text-xs px-2 py-1 rounded-full bg-emerald-600/60">✅ معالجة</button><button class="skip-notif-btn text-white text-xs px-2 py-1 rounded-full bg-gray-600/60">⏭️ تخطي</button></div></div>`;
        div.querySelector('.copy-phone').onclick=(e)=>{ e.stopPropagation(); copyToClipboard(c.phone||'', t('copied')); };
        div.querySelector('.copy-email').onclick=(e)=>{ e.stopPropagation(); copyToClipboard(c.email||'', t('copied')); };
        div.querySelector('.process-notif-btn').onclick=(e)=>{ e.stopPropagation(); processedNotifs.push(String(c.id)); sessionStorage.setItem('processedNotifs',JSON.stringify(processedNotifs)); renderNotifications(); showToast('✅ تمت المعالجة'); };
        div.querySelector('.skip-notif-btn').onclick=(e)=>{ e.stopPropagation(); skippedNotifs.push(String(c.id)); sessionStorage.setItem('skippedNotifs',JSON.stringify(skippedNotifs)); div.classList.add('notif-dismissed'); setTimeout(()=>renderNotifications(),400); showToast('⏭️ تم تخطي'); };
        container.appendChild(div);
    });
    if(processedNotifs.length){
        let pDiv=document.createElement('div');
        pDiv.className='mt-2 text-xs text-emerald-300';
        pDiv.innerHTML=`✅ معالج: ${processedNotifs.length} <button id="resetProcessed" class="text-gray-400 mr-2 underline">تراجع الكل</button>`;
        container.appendChild(pDiv);
        document.getElementById('resetProcessed')?.addEventListener('click',()=>{ processedNotifs=[]; sessionStorage.setItem('processedNotifs','[]'); renderNotifications(); });
    }
}

function renderDashboard() {
    if(!currentSession) return;
    const user = currentSession.user;
    document.getElementById('userEmail').innerText = user.email;
    const clients = loggedInClients;
    document.getElementById('totalCount').innerText = clients.length;
    let expiring = clients.filter(c=>{let d=daysRemaining(c.endDate); return d>=0&&d<=7;}).length;
    document.getElementById('expiringCount').innerText = expiring;
    let totalMAD = clients.reduce((s,c)=>s+(parseFloat(c.price)||0),0);
    document.getElementById('revenue').innerText = (totalMAD*exchange[currentCurrency]).toFixed(2);
    let totalProfit = clients.reduce((s,c)=>s+(parseFloat(c.netProfit)||0),0);
    document.getElementById('totalProfit').innerText = (totalProfit*exchange[currentCurrency]).toFixed(2);
    
    let search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = clients.filter(c=>(c.name||'').toLowerCase().includes(search)||(c.email||'').toLowerCase().includes(search));
    let html='';
    filtered.forEach((c,idx)=>{
        let days=daysRemaining(c.endDate);
        let status=days<0?'badge-expired':(days<=7?'badge-expiring':'badge-active');
        let priceF=(parseFloat(c.price)*exchange[currentCurrency]).toFixed(2)+' '+currencySymbols[currentCurrency];
        let profitF=(parseFloat(c.netProfit)*exchange[currentCurrency]).toFixed(2)+' '+currencySymbols[currentCurrency];
        html+=`<tr><td class="p-1">${idx+1}</td><td class="p-1">${escapeHtml(c.name)}</td><td class="p-1">${escapeHtml(c.email||'-')}</td><td class="p-1">${escapeHtml(c.phone||'-')}</td><td class="p-1">${escapeHtml(c.serviceType||'-')}</td><td class="p-1">${escapeHtml(c.country||'-')}</td><td class="p-1">${escapeHtml(c.appType||'-')}</td><td class="text-xs">${escapeHtml(c.key||'-')}</td><td class="text-xs">${escapeHtml(c.mac||'-')}</td><td class="p-1">${c.startDate||'-'}</td><td class="p-1">${c.endDate||'-'}</td><td class="p-1"><span class="${status} px-1.5 py-0.5 text-xs">${days>=0?days+' '+t('daysLeft'):t('expired')}</span></td><td class="p-1">${priceF}</td><td class="p-1">${profitF}</td><td class="p-1 whitespace-nowrap">
        <button onclick="editClientPrompt('${c.id}')" class="text-blue-300 mx-0.5 text-sm" title="${t('edit')}"><i class="fas fa-edit"></i></button>
        <button onclick="deleteClientPrompt('${c.id}')" class="text-red-300 mx-0.5 text-sm" title="${t('delete')}"><i class="fas fa-trash"></i></button>
        <button onclick="showClientCopyModalById('${c.id}')" class="text-green-300 mx-0.5 text-sm" title="${t('copy')}"><i class="fas fa-copy"></i></button>
        <button onclick="shareClient('${c.id}')" class="text-yellow-300 mx-0.5 text-sm" title="مشاركة"><i class="fas fa-share-alt"></i></button>
        </td></tr>`;
    });
    document.getElementById('clientsTable').innerHTML = html || `<tr><td colspan="15" class="text-center p-2">${t('no_clients')}</td></tr>`;
    renderMilestones();
    updateUILanguage();
}

window.showClientCopyModalById = (id) => { let c=loggedInClients.find(c=>c.id==id); if(c) showClientCopyModal(c); };
window.shareClient = (id) => { let c=loggedInClients.find(c=>c.id==id); if(c&&c.phone) window.open(`https://wa.me/${c.phone.replace(/\D/g,'')}?text=${encodeURIComponent(`معلومات العميل:\nالاسم: ${c.name}\nالبريد: ${c.email}\nالهاتف: ${c.phone}\nتاريخ النهاية: ${c.endDate}`)}`,'_blank'); else showToast('رقم الهاتف غير متوفر'); };
window.editClientPrompt = async (id) => {

function showClientCopyModal(client) {

}

function renderMilestones() {
    let count=loggedInClients.length;
    let next=THRESHOLDS.find(th=>count<th.limit);
    if(!next) return;
    let pct=Math.min(100,Math.round((count/next.limit)*100));
    let bar=document.getElementById('milestoneBar');
    if(bar) bar.innerHTML=`<div class="rounded-2xl p-3" style="background:rgba(139,92,246,0.1)"><div class="flex justify-between text-xs mb-1"><span>${next.icon} الهدف: ${next.label}</span><span>${count}/${next.limit} (${pct}%)</span></div><div class="h-2 bg-white/20 rounded-full"><div class="h-2 rounded-full" style="width:${pct}%;background:#8b5cf6"></div></div></div>`;
}

    let steps = [
        { title:'المعلومات الأساسية', fields:['name','email','phone'], labels:{name:t('clientName'),email:t('email'),phone:t('phone')}, types:{name:'text',email:'email',phone:'tel'} },
        { title:'تفاصيل الخدمة', fields:['serviceType','country','appType'], labels:{serviceType:t('service'),country:t('country'),appType:t('app_type')}, types:{serviceType:'text',country:'text',appType:'text'} },

    let currentStep = 0;
    const modal = document.createElement('div'); modal.className='modal-glass';
    modal.innerHTML=`<div class="modal-content" style="max-width:550px"><div class="step-progress" id="wizardProgress"></div><div id="wizardStepContent" class="wizard-step"></div><div class="flex gap-3 mt-5"><button id="wizardPrev" class="flex-1 bg-gray-600 py-2 rounded-full text-sm">${t('prev')}</button><button id="wizardNext" class="flex-1 bg-purple-600 py-2 rounded-full text-sm font-bold">${t('next')}</button></div></div>`;
    document.body.appendChild(modal);
    function updateStepUI() {

        for(let field of step.fields){ const label=step.labels[field]; const type=step.types[field]; let value=wizardData[field]||''; if(type==='textarea'){ html+=`<div><label class="block text-xs text-gray-300 mb-1">${label}</label><textarea id="wiz_${field}" class="wizard-field" rows="2">${escapeHtml(value)}</textarea></div>`; } else { html+=`<div><label class="block text-xs text-gray-300 mb-1">${label}</label><input type="${type}" id="wiz_${field}" class="wizard-field" value="${escapeHtml(String(value))}" ${field==='name'?'required':''}></div>`; } }
        html+=`</div>`; const container=document.getElementById('wizardStepContent'); container.style.opacity='0'; setTimeout(()=>{ container.innerHTML=html; container.style.opacity='1'; },100);
        document.getElementById('wizardPrev').style.display=currentStep===0?'none':'block';
        document.getElementById('wizardNext').innerText=currentStep===steps.length-1?t('save'):t('next');
    }
    function saveCurrentStep(){ const step=steps[currentStep]; for(let field of step.fields){ const el=document.getElementById(`wiz_${field}`); if(el) wizardData[field]=el.type==='number'?parseFloat(el.value)||0:el.value; } }
    async function nextStep(){
        saveCurrentStep();
        if(currentStep===steps.length-1){
            if(!wizardData.name){ showToast('⚠️ الاسم مطلوب'); return; }
            if(!wizardData.endDate){ showToast('⚠️ تاريخ النهاية مطلوب'); return; }
            modal.remove();
            try {
                await addClient(wizardData);
                await refreshClientsAndRender();
                showToast('✅ تمت إضافة العميل');
                let th = checkThresholdNeeded(loggedInClients.length);
                if(th) setTimeout(()=>showThresholdLock(th,()=>{}),300);
            } catch(e) { showToast('❌ خطأ في الحفظ: '+e.message); }
        } else { currentStep++; updateStepUI(); }
    }
    function prevStep(){ if(currentStep>0){ saveCurrentStep(); currentStep--; updateStepUI(); } }
    document.getElementById('wizardNext').onclick=nextStep;
    document.getElementById('wizardPrev').onclick=prevStep;
    updateStepUI();
}

function exportFullBackup() {
    const backup = { version:'BrandRimApp-supabase-auth-v1', user:{ email:currentSession.user.email }, clients:loggedInClients };
    const blob=new Blob([JSON.stringify(backup)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`brandrim_backup_${Date.now()}.json`; a.click();
    showToast('✅ تم تصدير النسخة');
}
async function importFullBackup(file) {
    const reader=new FileReader();
    reader.onload=async ev=>{
        try {
            const data=JSON.parse(ev.target.result);
            if(!data.clients) throw new Error();
            showToast('⏳ جاري الاستيراد...');
            for(let c of data.clients) {
                await addClient(c);
            }
            await refreshClientsAndRender();
            showToast(`✅ تم استيراد ${data.clients.length} عميل`);
        } catch(e) { showToast('❌ ملف غير صالح'); }
    };
    reader.readAsText(file);
}

// =====================================================

// =====================================================
async function doLogin(email, password, verify) {
    if(!verify) { alert(t('verify')); return false; }
    showToast('⏳ جاري تسجيل الدخول...');
    try {
        const session = await signIn(email, password);
        currentSession = session;
        await refreshClientsAndRender();
        document.getElementById('authScreen').style.display='none';
        document.getElementById('dashboardScreen').style.display='block';
        document.getElementById('avatar').src = `https://ui-avatars.com/api/?background=8b5cf6&color=fff&bold=true&size=40&name=${encodeURIComponent(session.user.user_metadata?.full_name || session.user.email)}`;
        showToast('✅ مرحبا بك');
        return true;
    } catch(e) {
        alert('❌ فشل تسجيل الدخول: '+e.message);
        return false;
    }
}

async function doSignup(email, fullName, password, confirm, verify) {
    if(!verify) { alert(t('verify')); return; }
    if(!email || !fullName) { alert(t('email')+' و '+t('fullname')+' مطلوبان'); return; }
    if(password !== confirm) { alert(t('password_mismatch')); return; }
    if(password.length < 6) { alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }
    showToast('⏳ جاري إنشاء الحساب...');
    try {
        await signUp(email, password, fullName);
        alert('✅ تم إنشاء الحساب. يمكنك تسجيل الدخول الآن.');
        document.getElementById('showLoginBtn').click();
    } catch(e) {
        alert('❌ فشل إنشاء الحساب: '+e.message);
    }
}

async function doLogout() {
    await signOut();
    currentSession = null;
    loggedInClients = [];
    document.getElementById('authScreen').style.display='flex';
    document.getElementById('dashboardScreen').style.display='none';
    showToast('تم الخروج');
}

            await refreshClientsAndRender();

    }
    document.getElementById('loadingScreen').style.opacity='0';

}
