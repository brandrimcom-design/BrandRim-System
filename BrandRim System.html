        * { font-family: 'Cairo', 'Inter', sans-serif; transition: all 0.2s ease; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes countUp { from { opacity: 0; transform: translateY(15px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes borderGlow { 0%,100% { border-color: rgba(139,92,246,0.4); box-shadow: 0 0 0 0 rgba(139,92,246,0.3); } 50% { border-color: rgba(192,132,252,0.8); box-shadow: 0 0 15px 3px rgba(139,92,246,0.3); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        @keyframes glowPulse { 0% { box-shadow: 0 0 0 0 rgba(139,92,246,0.4); } 70% { box-shadow: 0 0 0 10px rgba(139,92,246,0); } 100% { box-shadow: 0 0 0 0 rgba(139,92,246,0); } }
        
        .glass {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            animation: slideUp 0.5s ease-out;
        }
        .btn-gradient { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); transition: 0.3s; }
        .btn-gradient:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        /* أزرار التحكم العلوية مع تباعد محسّن */
        .action-btn {
            transition: all 0.25s ease;
            font-weight: 600;
            letter-spacing: -0.01em;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
        }
        .action-btn i { font-size: 1rem; transition: transform 0.2s; }
        .action-btn:hover i { transform: scale(1.1); }
        .btn-spacing-left { margin-right: 0.75rem; } /* تباعد مخصص بين الأزرار */
        
        .stat-card {
            background: rgba(79, 70, 229, 0.3);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            text-align: center;
            transition: transform 0.3s, background 0.3s;
            border: 1px solid rgba(139,92,246,0.4);
            animation: borderGlow 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.05) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: shimmer 3s ease-in-out infinite;
        }
        .stat-card:hover { transform: translateY(-8px) scale(1.03); background: rgba(79, 70, 229, 0.55); }
        .stat-number {
            font-size: 1.6rem;
            font-weight: 900;
            display: block;
            animation: countUp 0.6s cubic-bezier(0.2,0.9,0.4,1.1);
        }
        .client-table {
            background: rgba(79, 70, 229, 0.15);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            overflow-x: auto;
            display: block;
            white-space: nowrap;
            border: 1px solid rgba(139,92,246,0.3);
        }
        .client-table th, .client-table td { padding: 0.6rem 0.5rem; }
        .client-table th { background: rgba(79, 70, 229, 0.5); color: #f3f4f6; border-bottom: 1px solid #8b5cf6; font-size: 0.8rem; }
        .client-table td { background: rgba(15, 23, 42, 0.6); border-bottom: 1px solid #4c1d95; color: #e5e7eb; font-size: 0.8rem; }
        .client-table tbody tr:hover td { background: rgba(139, 92, 246, 0.4); }
        
        .badge-active { background: #10b981; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; }
        .badge-expiring { background: #f59e0b; animation: pulse 1s infinite; border-radius: 999px; font-size: 0.7rem; }
        .badge-expired { background: #ef4444; border-radius: 999px; font-size: 0.7rem; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .modal-glass {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }
        .modal-content {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            color: white;
            border: 1px solid rgba(139,92,246,0.5);
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
        }
        
        /* أنيميشن رائع لباقات VIP */
        .vip-plan {
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }
        .vip-plan:nth-child(1) { animation-delay: 0s; }
        .vip-plan:nth-child(2) { animation-delay: 0.2s; }
        .vip-plan:nth-child(3) { animation-delay: 0.4s; }
        .vip-plan::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s;
        }
        .vip-plan:hover::before { left: 100%; }
        .vip-plan:hover { transform: translateY(-10px) scale(1.05); background: rgba(139,92,246,0.4); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .vip-plan.selected {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #1e1b4b;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(245,158,11,0.7);
            animation: glowPulse 0.6s ease-out;
        }
        
        /* تحسين نافذة سياسة الخصوصية */
        .privacy-card {
            transition: all 0.3s;
            animation: slideRight 0.4s ease-out;
            border-right: 3px solid #8b5cf6;
        }
        .privacy-card:hover { transform: translateX(-5px); background: rgba(139,92,246,0.15); }
        
        .wizard-step { animation: slideRight 0.3s ease-out; }
        .step-progress { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .step-dot { flex: 1; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; transition: all 0.3s; }
        .step-dot.active { background: linear-gradient(90deg, #8b5cf6, #c084fc); animation: glowPulse 1s infinite; }
        .step-dot.completed { background: #10b981; }
        
        .auth-field, .wizard-field {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(139,92,246,0.4);
            border-radius: 1rem;
            padding: 0.7rem 1rem;
            color: white;
            width: 100%;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .auth-field:focus, .wizard-field:focus {
            outline: none;
            border-color: #c084fc;
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }
        
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1f2937; color: white; padding: 0.5rem 1rem;
            border-radius: 9999px; font-size: 0.875rem; z-index: 1100;
            animation: slideUp 0.3s ease;
        }
        
        .contact-card {
            transition: all 0.2s;
            cursor: pointer;
        }
        .contact-card:hover { background: rgba(139,92,246,0.3); transform: translateX(-5px); }
        
        .notification-item {
            background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(239,68,68,0.15));
            backdrop-filter: blur(8px);
            border-right: 4px solid #f59e0b;
            border-radius: 1rem;
            padding: 0.7rem 1rem;
            margin-bottom: 0.8rem;
            animation: slideRight 0.4s ease-out;
        }
        .notif-dismissed { animation: fadeOut 0.4s ease forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(60px); max-height: 0; margin: 0; padding: 0; overflow: hidden; } }
    </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

<div id="app" class="w-full max-w-7xl mx-auto">

            <div class="flex gap-4 mb-6">

                <button id="showSignupBtn" class="flex-1 py-2 rounded-full text-white"><span data-i18n="signup">إنشاء حساب</span></button>
            </div>
            <form id="loginForm">

                <div class="flex justify-center items-center gap-2 mb-4"><input type="checkbox" id="loginVerify" class="w-4 h-4"><label for="loginVerify" data-i18n="verify">تأكيد أنك لست روبوت</label></div>
                <button type="button" id="loginButton" class="btn-gradient w-full py-2 rounded-full text-white font-bold"><span data-i18n="login_btn">دخول</span></button>
                <div class="mt-3 flex justify-between"><a id="forgotPass" class="text-yellow-300 text-sm cursor-pointer" data-i18n="forgot">نسيت كلمة المرور؟</a><a id="privacyBtn" class="text-purple-300 text-xs cursor-pointer">🔒 سياسة الخصوصية</a></div>
                <!-- تم إخفاء النص "البيانات محفوظة محلياً" حسب الطلب -->
            </form>
            <form id="signupForm" style="display:none">

    </div>

                    <tbody id="clientsTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

    function t(key) { return translations[currentLang][key] || key; }

    function normalizeEmail(email) { return (email || '').trim().toLowerCase(); }
    function getAuthErrorMessage(error, fallback = 'Authentication failed.') {
        return error?.message || fallback;
    }
    function cleanupLegacyAuthStorage() {
        localStorage.removeItem('brandrim_users');
    }
    function getUserStorageKey(userId) { return `brandrim_user_data_${userId}`; }
    function getDefaultUserData(authUser) {
        const normalizedEmail = normalizeEmail(authUser?.email);
        return {
            id: authUser?.id,
            email: normalizedEmail,
            name: authUser?.user_metadata?.full_name || authUser?.user_metadata?.name || normalizedEmail,
            clients: [],
            unlockedThresholds: []
        };
    }
    function hydrateLoggedInUser(authUser) {
        if(!authUser) {
            loggedInUser = null;
            return null;
        }
        let stored = {};
        try {
            stored = JSON.parse(localStorage.getItem(getUserStorageKey(authUser.id)) || '{}');
        } catch (error) {
            stored = {};
        }
        const defaults = getDefaultUserData(authUser);
        loggedInUser = {
            ...defaults,
            ...stored,
            id: authUser.id,
            email: normalizeEmail(authUser.email),
            name: authUser.user_metadata?.full_name || authUser.user_metadata?.name || stored.name || defaults.name,
            clients: Array.isArray(stored.clients) ? stored.clients : [],
            unlockedThresholds: Array.isArray(stored.unlockedThresholds) ? stored.unlockedThresholds : []
        };
        saveUsers();
        return loggedInUser;
    }
    function saveUsers() {
        if(!loggedInUser?.id) return;
        localStorage.setItem(getUserStorageKey(loggedInUser.id), JSON.stringify({
            id: loggedInUser.id,
            email: normalizeEmail(loggedInUser.email),
            name: loggedInUser.name,
            clients: Array.isArray(loggedInUser.clients) ? loggedInUser.clients : [],
            unlockedThresholds: Array.isArray(loggedInUser.unlockedThresholds) ? loggedInUser.unlockedThresholds : []
        }));
    }
    function updateAvatar() {
        if(!loggedInUser) return;
        document.getElementById('avatar').src=`https://ui-avatars.com/api/?background=8b5cf6&color=fff&bold=true&size=40&name=${encodeURIComponent(loggedInUser.name||loggedInUser.email)}`;
    }
    function showAuthenticatedView(authUser) {
        hydrateLoggedInUser(authUser);
        document.getElementById('authScreen').style.display='none';
        document.getElementById('dashboardScreen').style.display='block';
        updateAvatar();
        renderDashboard();
        renderNotifications();
    }
    function showLoggedOutView() {
        loggedInUser = null;
        document.getElementById('authScreen').style.display='flex';
        document.getElementById('dashboardScreen').style.display='none';
        document.getElementById('password').value = '';
        document.getElementById('signupPassword').value = '';
        document.getElementById('signupConfirm').value = '';
    }
    async function initializeAuth() {
        cleanupLegacyAuthStorage();
        if(!supabase) {
            alert('Supabase failed to load. Please check your internet connection or CDN access.');
            showLoggedOutView();
            return;
        }
        const { data, error } = await window.supabaseClient.auth.getSession();
        if(error) {
            alert(getAuthErrorMessage(error));
            showLoggedOutView();
        } else if(data?.session?.user) {
            showAuthenticatedView(data.session.user);
        } else {
            showLoggedOutView();
        }
        window.supabaseClient.auth.onAuthStateChange((_event, session) => {
            if(session?.user) showAuthenticatedView(session.user);
            else showLoggedOutView();
        });
    }
    
    // ---------------------- العتبات (مبسطة) ----------------------
    const THRESHOLDS = [{ limit:5, code:'1990', icon:'🌱', label:'أول 5 عملاء' }, { limit:50, code:'2000', icon:'🚀', label:'50 عميلاً' }, { limit:100, code:'2010', icon:'💎', label:'100 عميل' }];
    function checkThresholdNeeded(newCount) { let unlocked = loggedInUser?.unlockedThresholds||[]; for(let i=THRESHOLDS.length-1;i>=0;i--) if(newCount>=THRESHOLDS[i].limit && !unlocked.includes(THRESHOLDS[i].limit)) return THRESHOLDS[i]; return null; }
    function showThresholdLock(threshold, onUnlock) { onUnlock(); }
    function isFirstOfMonth() { return new Date().getDate() === 1; }
    function isMonthlyUnlocked() { return localStorage.getItem(`monthly_unlock_${loggedInUser?.email}_${new Date().getFullYear()}_${new Date().getMonth()+1}`) === 'true'; }
    function setMonthlyUnlocked() { localStorage.setItem(`monthly_unlock_${loggedInUser?.email}_${new Date().getFullYear()}_${new Date().getMonth()+1}`, 'true'); }
    function needsMonthlyLock() { return isFirstOfMonth() && !isMonthlyUnlocked(); }
    function showMonthlyLock(onUnlock) { onUnlock(); }
    
    function addClientToUser(client, callback) {
        if(!loggedInUser) return;
        const doAdd=()=>{
            let newCount=(loggedInUser.clients?.length||0)+1;
            let th=checkThresholdNeeded(newCount);
            loggedInUser.clients.push({ id:Date.now(), ...client });
            saveUsers(); renderDashboard(); renderNotifications();
            if(callback) callback();
            if(th) setTimeout(()=>showThresholdLock(th,()=>{}),300);
        };
        if(needsMonthlyLock()) showMonthlyLock(doAdd); else doAdd();
    }
    function deleteClient(id) { if(loggedInUser){ loggedInUser.clients=loggedInUser.clients.filter(c=>c.id!=id); saveUsers(); renderDashboard(); renderNotifications(); } }
    function daysRemaining(end) { try{ return Math.ceil((new Date(end)-new Date())/(1000*60*60*24)); }catch(e){ return -1; } }
    
    // ---------------------- الإشعارات ----------------------
    let skippedNotifs = JSON.parse(sessionStorage.getItem('skippedNotifs') || '[]');
    let processedNotifs = JSON.parse(sessionStorage.getItem('processedNotifs') || '[]');
    function renderNotifications() {
        if(!loggedInUser) return;
        const clients = loggedInUser.clients || [];
        const expiringSoon = clients.filter(c => { let d=daysRemaining(c.endDate); return d>=0 && d<=7; });
        const container = document.getElementById('notificationsArea');
        if(!container) return;
        container.innerHTML = '';
        const visible = expiringSoon.filter(c => !skippedNotifs.includes(String(c.id)) && !processedNotifs.includes(String(c.id)));
        if(expiringSoon.length===0) return;
        const header = document.createElement('div'); header.className='mb-2 flex items-center gap-2'; header.innerHTML=`<i class="fas fa-bell text-amber-300 animate-pulse"></i><span class="text-white font-bold text-xs">${t('notification_title')}</span><span class="bg-amber-400/30 text-amber-200 text-xs px-2 rounded-full">${visible.length}</span>`;
        container.appendChild(header);
        visible.forEach(c => {
            const days = daysRemaining(c.endDate);
            const div = document.createElement('div'); div.className='notification-item'; div.innerHTML=`<div class="flex justify-between items-center flex-wrap gap-2"><div><i class="fas fa-exclamation-triangle text-amber-400 text-sm"></i> <span class="text-white text-xs">${t('expiring_soon_notif').replace('{name}',c.name).replace('{days}',days)}</span></div><div class="flex gap-1"><button class="copy-notif-btn copy-phone text-white text-xs px-2 py-1 rounded-full bg-white/20"><i class="fas fa-phone-alt"></i> ${t('copy_phone')}</button><button class="copy-notif-btn copy-email text-white text-xs px-2 py-1 rounded-full bg-white/20"><i class="fas fa-envelope"></i> ${t('copy_email')}</button><button class="process-notif-btn text-white text-xs px-2 py-1 rounded-full bg-emerald-600/60">✅ معالجة</button><button class="skip-notif-btn text-white text-xs px-2 py-1 rounded-full bg-gray-600/60">⏭️ تخطي</button></div></div>`;
            div.querySelector('.copy-phone').onclick=(e)=>{e.stopPropagation(); copyToClipboard(c.phone||'', t('copied')); };
            div.querySelector('.copy-email').onclick=(e)=>{e.stopPropagation(); copyToClipboard(c.email||'', t('copied')); };
            div.querySelector('.process-notif-btn').onclick=(e)=>{e.stopPropagation(); processedNotifs.push(String(c.id)); sessionStorage.setItem('processedNotifs',JSON.stringify(processedNotifs)); renderNotifications(); showToast('✅ تمت المعالجة'); };
            div.querySelector('.skip-notif-btn').onclick=(e)=>{e.stopPropagation(); skippedNotifs.push(String(c.id)); sessionStorage.setItem('skippedNotifs',JSON.stringify(skippedNotifs)); div.classList.add('notif-dismissed'); setTimeout(()=>renderNotifications(),400); showToast('⏭️ تم تخطي'); };
            container.appendChild(div);
        });
        if(processedNotifs.length){ let pDiv=document.createElement('div'); pDiv.className='mt-2 text-xs text-emerald-300'; pDiv.innerHTML=`✅ معالج: ${processedNotifs.length} <button id="resetProcessed" class="text-gray-400 mr-2 underline">تراجع الكل</button>`; container.appendChild(pDiv); document.getElementById('resetProcessed')?.addEventListener('click',()=>{ processedNotifs=[]; sessionStorage.setItem('processedNotifs','[]'); renderNotifications(); }); }
    }
    
    // ---------------------- أدوات مساعدة ----------------------
    function copyToClipboard(text,msg) { if(!text) return; navigator.clipboard.writeText(text).then(()=>showToast(msg)).catch(()=>{ let ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); showToast(msg); }); }
    function showToast(msg) { let t=document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    function escapeHtml(str) { return String(str||'').replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]); }
    
    // ---------------------- معالج إضافة عميل متعدد الخطوات (Wizard) ----------------------
    function openAddClientWizard() {
        let wizardData = {
            name: '', email: '', phone: '', serviceType: '', country: '', appType: '',
            key: '', mac: '', startDate: new Date().toISOString().split('T')[0],
            endDate: new Date(Date.now() + 30*86400000).toISOString().split('T')[0],
            price: 0, netProfit: 0, notes: ''
        };
        let steps = [
            { title: 'المعلومات الأساسية', fields: ['name','email','phone'], labels: { name:t('clientName'), email:t('email'), phone:t('phone') }, types: { name:'text', email:'email', phone:'tel' } },
            { title: 'تفاصيل الخدمة', fields: ['serviceType','country','appType'], labels: { serviceType:t('service'), country:t('country'), appType:t('app_type') }, types: { serviceType:'text', country:'text', appType:'text' } },
            { title: 'بيانات تقنية', fields: ['key','mac'], labels: { key:'KEY', mac:'MAC' }, types: { key:'text', mac:'text' } },
            { title: 'التواريخ', fields: ['startDate','endDate'], labels: { startDate:t('start_date'), endDate:t('end_date') }, types: { startDate:'date', endDate:'date' } },
            { title: 'المالية والملاحظات', fields: ['price','netProfit','notes'], labels: { price:t('price'), netProfit:t('net_profit'), notes:t('notes') }, types: { price:'number', netProfit:'number', notes:'textarea' } }
        ];
        let currentStep = 0;
        const modal = document.createElement('div'); modal.className = 'modal-glass';
        modal.innerHTML = `
            <div class="modal-content" style="max-width:550px">
                <div class="step-progress" id="wizardProgress"></div>
                <div id="wizardStepContent" class="wizard-step"></div>
                <div class="flex gap-3 mt-5">
                    <button id="wizardPrev" class="flex-1 bg-gray-600 py-2 rounded-full text-sm">${t('prev')}</button>
                    <button id="wizardNext" class="flex-1 bg-purple-600 py-2 rounded-full text-sm font-bold">${t('next')}</button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        
        function updateStepUI() {
            const progressDiv = document.getElementById('wizardProgress');
            progressDiv.innerHTML = steps.map((_,idx) => `<div class="step-dot ${idx<currentStep ? 'completed' : (idx===currentStep ? 'active' : '')}"></div>`).join('');
            const step = steps[currentStep];
            let html = `<h3 class="text-lg font-bold mb-3 text-center">${step.title}</h3><div class="space-y-3">`;
            for(let field of step.fields) {
                const label = step.labels[field];
                const type = step.types[field];
                let value = wizardData[field] || '';
                if(type === 'textarea') {
                    html += `<div><label class="block text-xs text-gray-300 mb-1">${label}</label><textarea id="wiz_${field}" class="wizard-field" rows="2">${escapeHtml(value)}</textarea></div>`;
                } else {
                    html += `<div><label class="block text-xs text-gray-300 mb-1">${label}</label><input type="${type}" id="wiz_${field}" class="wizard-field" value="${escapeHtml(value)}" ${field==='name' ? 'required' : ''}></div>`;
                }
            }
            html += `</div>`;
            const container = document.getElementById('wizardStepContent');
            container.style.opacity = '0';
            setTimeout(() => { container.innerHTML = html; container.style.opacity = '1'; }, 100);
            document.getElementById('wizardPrev').style.display = currentStep === 0 ? 'none' : 'block';
            document.getElementById('wizardNext').innerText = currentStep === steps.length-1 ? t('save') : t('next');
        }
        
        function saveCurrentStep() {
            const step = steps[currentStep];
            for(let field of step.fields) {
                const el = document.getElementById(`wiz_${field}`);
                if(el) wizardData[field] = el.type==='number' ? parseFloat(el.value)||0 : el.value;
            }
        }
        
        function nextStep() {
            saveCurrentStep();
            if(currentStep === steps.length-1) {
                if(!wizardData.name) { showToast('⚠️ الاسم مطلوب'); return; }
                if(!wizardData.endDate) { showToast('⚠️ تاريخ النهاية مطلوب'); return; }
                addClientToUser(wizardData, () => { modal.remove(); showToast('✅ تمت إضافة العميل'); });
            } else {
                currentStep++;
                updateStepUI();
            }
        }
        
        function prevStep() { if(currentStep>0) { saveCurrentStep(); currentStep--; updateStepUI(); } }
        
        document.getElementById('wizardNext').onclick = nextStep;
        document.getElementById('wizardPrev').onclick = prevStep;
        updateStepUI();
    }

    // ---------------------- عرض لوحة التحكم ----------------------
    function renderDashboard() {
        if(!loggedInUser) return;
        document.getElementById('userEmail').innerText = loggedInUser.email;
        const clients = loggedInUser.clients || [];
        document.getElementById('totalCount').innerText = clients.length;
        let expiring = clients.filter(c=>{let d=daysRemaining(c.endDate); return d>=0 && d<=7;}).length;
        document.getElementById('expiringCount').innerText = expiring;
        let totalMAD = clients.reduce((s,c)=>s+(parseFloat(c.price)||0),0);
        document.getElementById('revenue').innerText = (totalMAD*exchange[currentCurrency]).toFixed(2);
        let totalProfit = clients.reduce((s,c)=>s+(parseFloat(c.netProfit)||0),0);
        document.getElementById('totalProfit').innerText = (totalProfit*exchange[currentCurrency]).toFixed(2);
        let search = document.getElementById('searchInput').value.toLowerCase();
        let filtered = clients.filter(c=>c.name.toLowerCase().includes(search) || (c.email||'').toLowerCase().includes(search));
        let html='';
        filtered.forEach((c,idx)=>{
            let days = daysRemaining(c.endDate);
            let status = days<0 ? 'badge-expired' : (days<=7 ? 'badge-expiring' : 'badge-active');
            let priceF = (c.price*exchange[currentCurrency]).toFixed(2)+' '+currencySymbols[currentCurrency];
            let profitF = (c.netProfit*exchange[currentCurrency]).toFixed(2)+' '+currencySymbols[currentCurrency];
            html+=`<tr><td class="p-1">${idx+1}<td class="p-1">${escapeHtml(c.name)}<td class="p-1">${escapeHtml(c.email||'-')}<td class="p-1">${escapeHtml(c.phone||'-')}<td class="p-1">${escapeHtml(c.serviceType||'-')}<td class="p-1">${escapeHtml(c.country||'-')}<td class="p-1">${escapeHtml(c.appType||'-')}<td class="text-xs">${escapeHtml(c.key||'-')}<td class="text-xs">${escapeHtml(c.mac||'-')}<td class="p-1">${c.startDate}<td class="p-1">${c.endDate}<td class="p-1"><span class="${status} px-1.5 py-0.5 text-xs">${days>=0?days+' '+t('daysLeft'):t('expired')}</span><td class="p-1">${priceF}<td class="p-1">${profitF}<td class="p-1 whitespace-nowrap">

            </tr>`;
        });
        document.getElementById('clientsTable').innerHTML = html || `<tr><td colspan="15" class="text-center p-2">${t('no_clients')}</tr>`;
        renderMilestones();
        updateUILanguage();

    importFullBackup = function(file) {
        if(!loggedInUser) {
            alert('Please log in before importing a backup.');
            return;
        }
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const data = JSON.parse(ev.target.result);
                let importedUser = null;
                if(data?.user) {
                    importedUser = data.user;
                } else if(Array.isArray(data?.users)) {
                    importedUser = data.users.find(u => normalizeEmail(u.email) === normalizeEmail(loggedInUser.email)) || data.users[0];
                }
                if(!importedUser) throw new Error('Invalid backup');
                loggedInUser = {
                    ...loggedInUser,
                    name: importedUser.name || loggedInUser.name,
                    clients: Array.isArray(importedUser.clients) ? importedUser.clients : [],
                    unlockedThresholds: Array.isArray(importedUser.unlockedThresholds) ? importedUser.unlockedThresholds : []
                };
                saveUsers();
                showToast('✅ تم استيراد النسخة');
                renderDashboard();
                renderNotifications();
            } catch(e) {
                showToast('❌ ملف غير صالح');
            }
        };
        reader.readAsText(file);
    };

            let confirm=document.getElementById('signupConfirm').value;
            let verify=document.getElementById('signupVerify').checked;
            console.log('Step 2: Data Collected', { email: normalizeEmail(email), verifyChecked: verify, hasPassword: !!pass, hasName: !!name });
            if(!email||!name){ alert(t('email')+" و "+t('fullname')+" مطلوبان"); return; }
            if(pass!==confirm){ alert(t('password_mismatch')); return; }
            if(!window.supabaseClient) {
                console.error('Supabase client is not initialized.');
                alert('Supabase is not initialized.');
                return;
            }
            const normalizedEmail = normalizeEmail(email);
            console.log('Step 3: Sending to Supabase');
            const { data, error } = await window.supabaseClient.auth.signUp({
                email: normalizedEmail,
                password: pass,
                options: {
                    data: {
                        full_name: name,
                        name
                    }
                }
            });
            if(error){ alert(getAuthErrorMessage(error, 'Sign-up failed.')); return; }
            if(data?.user) {
                alert(data.session ? 'Account created successfully.' : 'Account created. If email confirmation is enabled, confirm your email before logging in.');
                document.getElementById('showLoginBtn').click();
            }
        });

        forgotButton?.addEventListener('click', async ()=>{
            let email = prompt(t('email'));
            if(!email) return;
            const normalizedEmail = normalizeEmail(email);
            const { error } = await window.supabaseClient.auth.resetPasswordForEmail(normalizedEmail, {
                redirectTo: window.location.href
            });
            if(error){ alert(getAuthErrorMessage(error, 'Password reset failed.')); return; }
            alert('Password reset email sent.');
        });

        logoutButton?.addEventListener('click', async ()=>{
            const { error } = await window.supabaseClient.auth.signOut({ scope: 'global' });
            if(error){ alert(getAuthErrorMessage(error, 'Logout failed.')); return; }
            showLoggedOutView();
        });

        changePassButton?.addEventListener('click', showChangePasswordModal);
        exportButton?.addEventListener('click', exportFullBackup);
        importButton?.addEventListener('click', ()=>document.getElementById('importFile')?.click());
        importInput?.addEventListener('change', e=>{ if(e.target.files[0]) importFullBackup(e.target.files[0]); e.target.value=''; });
    }

    applyLanguage();
    bindSupabaseAuthHandlers();
    initializeAuth();
</script>
</body>
</html>
